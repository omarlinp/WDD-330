<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
        <section class="checkout-form">
          <form action="" name="checkout">
          <fieldset>
            <legend>Shipping</legend>
            <div class="checkout__name">
              <label for="fname">First Name</label>
              <input name="fname" required>
              <label for="lname">Last name</label>
              <input name="lname" required>
            </div>
            <div class="checkout__address">
              <label for="street">Street</label>
              <input name="street" required>
              
              <label for="city">City</label>
              <input name="city" required>
              
              <label for="state">State</label>
              <input name="state" required>
              
              <label for="">Zip</label>
              <input name="Zip" id="zip" required>
            </div>
          </fieldset>
          <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Card Number</label>
            <input name="cardNumber" required>

            <label for="expiration">Expiration</label>
            <input name="expiration" required>

            <label for="code">Security Code</label>
            <input name="code" required>

          </fieldset>
          <fieldset>
            <legend>Order Summary</legend>
            <ul>
              <li>
                <label for="cartTotal">Item Subtotal (<span id="num-items"></span>)</label>
                <p id="cartTotal" name="cartTotal"></p>
              </li>
              <li>
                <label for="shipping">Shipping Estimate</label>
                <p id="shipping"></p>
              </li>
              <li>
                <label for="tax">Tax</label>
                <p id="tax"></p>
              </li>
              <li>
                <label for="orderTotal">Order Total</label>
                <p id="orderTotal"></p>
              </li>
            </ul>
          </fieldset>
          <button id="checkoutSubmit" type="submit"> checkout</button>
          </form>
        </section>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
